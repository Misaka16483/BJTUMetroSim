<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9号线联锁图 — 成员C</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#040810;color:#c9d1d9;height:100vh;display:flex;flex-direction:column}
#bar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#0d1424;border-bottom:1px solid #172436;flex-shrink:0}
#bar button{padding:5px 12px;border:1px solid #1a2240;border-radius:4px;cursor:pointer;font-size:12px;background:#0d1424;color:#8b949e}
#bar button:hover{color:#fff;border-color:#2b4a6b}
#bar button.on{border-color:#3fb950;color:#3fb950}
#stats{display:flex;gap:18px;margin-left:auto;font-size:12px;align-items:center}
.g{color:#3fb950;font-weight:700}.r{color:#f85149;font-weight:700}.y{color:#d29922;font-weight:700}
#main{display:flex;flex:1;min-height:0}
#left{display:flex;flex-direction:column;flex:1;min-width:0}
#canvas-wrap{flex:1;overflow:hidden;cursor:grab}
#canvas-wrap:active{cursor:grabbing}
canvas{display:block}
#log{width:360px;flex-shrink:0;border-left:1px solid #172436;background:#0d1117;display:flex;flex-direction:column;overflow:hidden}
#tab-bar{display:flex;border-bottom:1px solid #172436;flex-shrink:0}
#tab-bar button{flex:1;padding:8px 0;border:none;background:transparent;color:#5f7088;font-size:10px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer}
#tab-bar button.on{color:#58a6ff;border-bottom:2px solid #58a6ff;background:rgba(88,166,255,0.05)}
#log,#route-tab{flex:1;display:flex;flex-direction:column;overflow:hidden}
#route-tab{display:none}
#log-content{display:flex;flex-direction:column;overflow:hidden;flex:1}
#log h3,#route-tab h3{padding:10px 14px;border-bottom:1px solid #172436;font-size:11px;text-transform:uppercase;color:#5f7088;flex-shrink:0;display:flex;justify-content:space-between}
#log-list,#route-list{flex:1;overflow-y:auto;padding:4px 0;font-family:monospace;font-size:10px;line-height:1.6}
#log-list div,#route-list div{padding:2px 14px;border-bottom:1px solid #0d1424;white-space:nowrap}
#route-list div{cursor:pointer;transition:.1s;overflow:hidden;text-overflow:ellipsis}
#route-list div:hover{background:#1a2640}
#route-list div.sel{background:#1a2e40;border-left:2px solid #58a6ff;color:#58a6ff}
#route-list div .m{font-size:9px;color:#484f58}
#route-inspector{padding:10px 14px;border-bottom:1px solid #172436;font-size:11px;color:#a7bacb;line-height:1.7}
#route-inspector b{color:#d7ebff}.route-actions{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.route-actions button{padding:3px 6px;border:1px solid #31506d;border-radius:3px;background:#111d2b;color:#b9dcff;font-size:10px;cursor:pointer}
.route-actions button:hover{background:#1b3047;color:#fff}.route-actions button.warn{border-color:#9b6a20;color:#f0c040}
.route-item{white-space:normal!important;padding:7px 14px!important}.route-item .route-title{display:flex;justify-content:space-between;gap:8px}.route-item .route-title span:last-child{color:#5f7088;font-size:9px}.empty-note{padding:12px 14px;color:#5f7088;font-size:11px;line-height:1.6}
#log-list .occ{color:#f85149}#log-list .lock{color:#d29922}#log-list .rel{color:#3fb950}
#log-list .ent{color:#f0c040}#log-list .sig{color:#58a6ff}#log-list .vac{color:#3a4a5a}
#foot{display:flex;align-items:center;padding:4px 16px;background:#0d1424;border-top:1px solid #172436;font-size:10px;color:#3a4a5a;gap:16px;flex-shrink:0}
</style>
</head>
<body>
<div id="bar">
  <button id="btn-play" onclick="playBtn()" class="on">▶ Play</button>
  <button onclick="ps()">⏸ Pause</button>
  <button onclick="st()">⏭ Step</button>
  <button onclick="rst()" style="color:#f85149;border-color:#f85149">↺ Reset</button>
  <span style="color:#2a3040;margin:0 4px">|</span>
  <button onclick="zm(1.3)">+</button><button onclick="zm(0.77)">-</button>
  <button onclick="fit()">Fit</button>
  <span style="font-size:11px;color:#3a4a5a;font-family:monospace" id="zl">100%</span>
  <span style="color:#2a3040;margin:0 4px">|</span>
  <div id="stats">
    <span>Tick <span class="g" id="tk">0</span></span>
    <span>Occ <span class="r" id="oc">0</span></span>
    <span>Lock <span class="y" id="lc">0</span></span>
    <span>Sig <span class="g" id="sc">0</span></span>
  </div>
</div>
<div id="main">
  <div id="left">
    <div id="canvas-wrap"><canvas id="c"></canvas></div>
    <div id="foot"></div>
  </div>
  <div id="log">
    <div id="tab-bar">
      <button onclick="switchTab('log')" id="tab-log" class="on">事件日志</button>
      <button onclick="switchTab('route')" id="tab-route">进路检查</button>
    </div>
    <div id="log-content">
      <h3>事件日志 <span id="lcnt" style="color:#3a4a5a;font-weight:400;font-size:10px;margin-left:8px">0</span></h3>
      <div id="log-list"></div>
    </div>
    <div id="route-tab" style="display:none">
      <h3>轨道与进路 <span id="rcnt" style="color:#3a4a5a;font-weight:400;font-size:10px;margin-left:8px">0</span></h3>
      <div id="route-inspector">点击图中的轨道以查看相关进路。</div>
      <div style="padding:4px 10px"><input id="route-filter" placeholder="搜索进路..." style="width:100%;padding:4px 8px;border:1px solid #1a2240;border-radius:3px;background:#0d1117;color:#c9d1d9;font-size:10px;font-family:monospace;outline:none" oninput="filterRoutes()"></div>
      <div id="route-list"></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════ 全局变量 ═══════════════════════════ */
var query=new URLSearchParams(location.search);
var ENGINE_MODE=query.get('engine')==='1';
var A=query.get('api')||location.origin, S=null, prev=null, tm=null, spd=10;
var STATE_ENDPOINT=ENGINE_MODE?'/api/sim/topology-state':'/api/phase2/member-c/state';
var c=document.getElementById('c'), cx=c.getContext('2d');
var sc=1, ox=0, oy=0, dr=null, w=document.getElementById('canvas-wrap');
var BM=60, UY=90, DY=140, SY=60;
var evts=[];

var RD=null,selRoutes={},segTopo={};
setTimeout(function(){fetch(A+'/api/phase2/member-c/static-routes').then(function(r){return r.json()}).then(function(d){
  RD=d;updateRouteList();
  for(var i=0;i<d.segments.length;i++){var s=d.segments[i];segTopo[s.id]={row:s.row,col:s.col,endDiv:s.endDiv,sw:s.sw,stn:s.stn}}
}).catch(function(e){console.error(e)})},100);

function switchTab(tab){
  document.getElementById('tab-log').className = tab==='log'?'on':'';
  document.getElementById('tab-route').className = tab==='route'?'on':'';
  document.getElementById('log-content').style.display = tab==='log'?'flex':'none';
  document.getElementById('route-tab').style.display = tab==='route'?'flex':'none';
}

/* ═══════════════════════════ 后端通信 ═══════════════════════════ */
function api(u,fn){
  fetch(A+u).then(function(r){return r.json()}).then(function(d){
    prev=S; S=d; if(fn)fn();
  }).catch(function(e){console.error(u,e)});
}
function enginePost(path,fn){
  fetch(A+path,{method:'POST'}).then(function(r){return r.json()}).then(function(d){
    if(d.tick!==undefined){prev=S;S=d;}
    if(fn)fn(d);
  }).catch(function(e){console.error(path,e)});
}
function st(){
  if(!ENGINE_MODE){api('/api/phase2/member-c/step',draw);return;}
  ps();enginePost('/api/sim/step',draw);
}
function rst(){
  evts=[];prev=null;
  if(!ENGINE_MODE){api('/api/phase2/member-c/reset',draw);return;}
  ps();enginePost('/api/sim/stop',function(){api(STATE_ENDPOINT,draw)});
}
function playBtn(){
  if(!ENGINE_MODE){
    if(tm)return;
    document.getElementById('btn-play').classList.add('on');
    tm=setInterval(function(){st()},1000/spd);
    return;
  }
  document.getElementById('btn-play').classList.add('on');
  if(S&&S.clockState==='RUNNING')return;
  enginePost(S&&S.clockState==='PAUSED'?'/api/sim/resume':'/api/sim/start',function(){api(STATE_ENDPOINT,draw)});
}function ps(){
  clearInterval(tm);tm=null;document.getElementById('btn-play').classList.remove('on');
  if(ENGINE_MODE&&S&&S.clockState==='RUNNING')enginePost('/api/sim/pause',function(){api(STATE_ENDPOINT,draw)});
}

/* ═══════════════════════════ 缩放平移 ═══════════════════════════ */
function zm(k){sc=Math.max(0.2,Math.min(10,sc*k));document.getElementById('zl').textContent=Math.round(sc*100)+'%';draw()}
function fit(){sc=1;ox=0;oy=0;document.getElementById('zl').textContent=Math.round(sc*100)+'%';draw()}
w.addEventListener('wheel',function(e){e.preventDefault();zm(e.deltaY>0?0.9:1.1)},{passive:false});
w.addEventListener('mousedown',function(e){dr={sx:e.clientX,sy:e.clientY,ox:ox,oy:oy}});
window.addEventListener('mousemove',function(e){if(!dr)return;ox=dr.ox+(e.clientX-dr.sx);oy=dr.oy+(e.clientY-dr.sy);draw()});
window.addEventListener('mouseup',function(){dr=null});

/* ═══════════════════════════ 事件日志 ═══════════════════════════ */
function log(cls,msg){
  evts.unshift({c:cls,m:msg,t:S?S.tick:0});if(evts.length>200)evts.pop();
  var ls=document.getElementById('log-list');
  ls.innerHTML=evts.map(function(e){return '<div class="'+e.c+'">['+e.t+'] '+e.m+'</div>'}).join('');
  document.getElementById('lcnt').textContent=evts.length;
}
function detect(){
  if(!prev||!S)return;
  var i,no={},po={};if(S.axleSections)for(i=0;i<S.axleSections.length;i++){var a=S.axleSections[i];if(a.occupied)no[a.sectionId]=a.name||a.sectionId}if(prev.axleSections)for(i=0;i<prev.axleSections.length;i++){var a=prev.axleSections[i];if(a.occupied)po[a.sectionId]=a.name||a.sectionId}
  for(var s in no){if(!po[s])log('occ','OCCUPY section '+s+' ('+no[s]+')')}
  for(var s in po){if(!no[s])log('vac','VACATE section '+s+' ('+po[s]+')')}
  if(S.routes&&prev.routes){var np={},pp={};for(i=0;i<S.routes.length;i++)np[S.routes[i].routeId]=S.routes[i];for(i=0;i<prev.routes.length;i++)pp[prev.routes[i].routeId]=prev.routes[i];
  for(var r in np){var nr=np[r],pr=pp[r]||{state:'IDLE',hasEntered:false};if(nr.state!==pr.state){
    if(nr.state=='LOCKED')log('lock','ROUTE '+r+' LOCKED');
    else if(nr.state=='APPROACH_LOCKED')log('lock','ROUTE '+r+' APPROACH');
    else if(pr.state!='IDLE'&&nr.state=='IDLE')log('rel','ROUTE '+r+' RELEASED');
    else if(nr.state=='FAILED')log('occ','ROUTE '+r+' FAILED: '+(nr.failureReason||''));
  }if(nr.hasEntered&&!pr.hasEntered)log('ent','TRAIN ENTERED route '+r)}}
}

function filterRoutes(){
  var q=document.getElementById('route-filter').value.toLowerCase();
  updateRouteList(q);
}
function clickRoute(rid){
  if(selRoutes[rid]){delete selRoutes[rid]}else{
    if(!RD||!RD.routes)return;
    var rd=RD.routes.find(function(r){return r.id===rid});if(rd)selRoutes[rid]=rd
  }
  updateRouteList(document.getElementById('route-filter').value);draw();
}
function updateRouteList(filter){
  if(!RD||!RD.routes)return;
  var lst=document.getElementById('route-list'), list=RD.routes;
  if(filter){list=list.filter(function(r){return r.id.indexOf(filter)>=0||r.name.toLowerCase().indexOf(filter)>=0})}
  lst.innerHTML=list.map(function(r){return '<div class="'+(selRoutes[r.id]?'sel':'')+'" onclick="clickRoute(\''+r.id+'\')"><span><b>'+r.id+'</b> '+r.name+'</span><span class="m">sig'+r.startSig+'&rarr;sig'+r.endSig+'</span></div>'}).join('');
  document.getElementById('rcnt').textContent=list.length+'/'+RD.routes.length;
}

/* ═══════════════════════════ 渲染 ═══════════════════════════ */
function resize(){
  var ww=w.clientWidth, wh=w.clientHeight;
  c.width=ww*2; c.height=wh*2; c.style.width=ww+'px'; c.style.height=wh+'px';
}
window.addEventListener('resize',function(){resize();draw()});

function draw(){
  resize();cx.clearRect(0,0,c.width,c.height);
  if(!S||!S.segments)return;
  
detect();
  var i2,segs2=S.segments;
  for(i2=0;i2<segs2.length;i2++){var tp=segTopo[segs2[i2].id];if(tp){segs2[i2].row=tp.row;segs2[i2].col=tp.col;segs2[i2].endDiv=tp.endDiv;segs2[i2].sw=tp.sw;segs2[i2].stn=tp.stn}else{segs2[i2].row=segs2[i2].row||0;segs2[i2].col=segs2[i2].col||i2}}
  var segs=segs2,tc=S.segTrainColors||{},ts=S.trains||[],sigs=S.signals||[],i,j,n=segs.length;
  var segsByRow={};
  for(i=0;i<n;i++){var r=segs[i].row||0;if(!segsByRow[r])segsByRow[r]=[];segsByRow[r].push(segs[i])}
  var segEq={};for(i=0;i<n;i++)segEq[segs[i].id]=1;
  for(i=0;i<sigs.length;i++){var id=sigs[i].segId;if(segEq[id]!=null)segEq[id]++}
  for(i=0;i<n;i++){if(segs[i].sw)segEq[segs[i].id]+=0.5}
  var W2=w.clientWidth*2-BM*2-40;
  var segWidth={},rowX={},rowTotalW={};
  for(var row in segsByRow){var rsegs=segsByRow[row];rsegs.sort(function(a,b){return a.col-b.col});
    var tw=0;for(i=0;i<rsegs.length;i++)tw+=segEq[rsegs[i].id];
    rowX[row]=[];rowTotalW[row]=0;
    for(i=0;i<rsegs.length;i++){var sw3=Math.max(14,W2*segEq[rsegs[i].id]/tw);segWidth[rsegs[i].id]=sw3;rowX[row].push({segId:rsegs[i].id,x:rowTotalW[row],w:sw3});rowTotalW[row]+=sw3}}
  var ROW_H=56,rowY={},y2=80;
  for(var row in segsByRow){rowY[row]=y2;y2+=ROW_H}
  var totalH=y2+60;
  cx.save();cx.scale(2,2);cx.translate(ox,oy);cx.scale(sc,sc);
  cx.fillStyle='#040810';cx.fillRect(-50,-50,BM+Math.max(W2,1200)+100,totalH);
  var segMap={};
  for(var row in segsByRow){var ry=rowY[row];var rx2=BM;cx.strokeStyle=row==0?'#3a5a7a':'#2a3a4a';cx.lineWidth=row==0?3:2;cx.beginPath();cx.moveTo(BM,ry);cx.lineTo(BM+rowTotalW[row],ry);cx.stroke();
    for(i=0;i<rowX[row].length;i++){var rsi=rowX[row][i];var sid=rsi.segId,sx=BM+rsi.x,sw2=rsi.w;segMap[sid]={x:sx,w:sw2,y:ry,row:row};
      var cl2=tc[sid]||null;if(cl2){cx.fillStyle=cl2;cx.globalAlpha=0.3;cx.fillRect(sx,ry-3,sw2,6);cx.globalAlpha=1}
      cx.strokeStyle='#1a2a3a';cx.lineWidth=0.3;cx.beginPath();cx.moveTo(sx,ry-6);cx.lineTo(sx,ry+6);cx.stroke();
      cx.fillStyle='#3a4a60';cx.font='8px monospace';cx.textAlign='center';cx.fillText(sid,sx+sw2/2,ry+16)}}
  for(i=0;i<n;i++){var seg=segs[i];if(!seg.endDiv)continue;var p2=segMap[seg.id];if(!p2)continue;var c2=segMap[seg.endDiv];if(!c2)continue;
    cx.strokeStyle='#d29922';cx.lineWidth=1.2;cx.globalAlpha=0.6;cx.beginPath();cx.moveTo(p2.x+p2.w/2,p2.y);cx.lineTo(c2.x,c2.y);cx.stroke();cx.globalAlpha=1;
    cx.fillStyle='#d29922';cx.font='9px monospace';cx.textAlign='center';cx.fillText('W',p2.x+p2.w/2,p2.y-8)}
  for(i=0;i<segs.length;i++){if(!segs[i].stn)continue;var sp=segMap[segs[i].id];if(!sp)continue;
    cx.fillStyle='rgba(143,195,31,0.25)';cx.fillRect(sp.x,sp.y-12,sp.w,22);cx.fillStyle='#f0c040';cx.font='9px sans-serif';cx.textAlign='center';cx.fillText('P'+segs[i].stn,sp.x+sp.w/2,sp.y-14)}
  for(i=0;i<sigs.length;i++){var sg2=sigs[i];var sp5=segMap[sg2.segId];if(!sp5)continue;
    var cl3=sg2.aspect=='GREEN'?'#3fb950':sg2.aspect=='YELLOW'?'#d29922':'#f85149';
    var sy=sp5.y-16;cx.fillStyle=cl3;cx.globalAlpha=0.2;cx.beginPath();cx.arc(sp5.x+sp5.w*0.4,sy,8,0,2*Math.PI);cx.fill();cx.globalAlpha=1;
    cx.fillStyle=cl3;cx.beginPath();cx.arc(sp5.x+sp5.w*0.4,sy,4,0,2*Math.PI);cx.fill();cx.strokeStyle='#fff';cx.lineWidth=0.5;cx.stroke();
    cx.strokeStyle='#3a4a5a';cx.lineWidth=0.6;cx.beginPath();cx.moveTo(sp5.x+sp5.w*0.4,sp5.y);cx.lineTo(sp5.x+sp5.w*0.4,sy+3);cx.stroke();
    cx.fillStyle='#6a7a90';cx.font='8px monospace';cx.textAlign='center';cx.fillText(sg2.name||('S'+sg2.id),sp5.x+sp5.w*0.4,sy-8)}
  for(i=0;i<ts.length;i++){var t=ts[i],sp7=segMap[t.segId];if(!sp7)continue;
    var bW=Math.max(t.lengthM/100*40,20),tx=sp7.x+sp7.w/2-bW/2,ty=sp7.y-22;
    cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(tx+2,ty+2,bW,28);
    cx.fillStyle=t.color;cx.fillRect(tx,ty,bW,28);cx.strokeStyle='#fff';cx.lineWidth=1;cx.strokeRect(tx,ty,bW,28);
    cx.fillStyle='#fff';cx.beginPath();cx.moveTo(tx+bW+2,ty+14);cx.lineTo(tx+bW-6,ty+6);cx.lineTo(tx+bW-6,ty+22);cx.fill();
    cx.fillStyle='#fff';cx.font='bold 10px monospace';cx.textAlign='left';cx.fillText(t.id+' '+t.speedMps.toFixed(0)+'m/s',tx,ty-4)}
  if(RD&&RD.segments){for(var rid2 in selRoutes){var srd=selRoutes[rid2];
    cx.fillStyle='rgba(88,166,255,0.3)';var ps=srd.pathSegs||[];
    for(j=0;j<ps.length;j++){var sp8=segMap[ps[j]];if(sp8)cx.fillRect(sp8.x-1,sp8.y-4,sp8.w+2,8)}}}
  cx.restore();
  document.getElementById('tk').textContent=S.tick;document.getElementById('oc').textContent=S.occupiedCount+'/'+S.totalAxleSections;
  document.getElementById('lc').textContent=S.lockedRouteCount;var gc2=0;for(i=0;i<sigs.length;i++)if(sigs[i].aspect!='RED')gc2++;
  document.getElementById('sc').textContent=gc2+'/'+sigs.length;
  var rc=Object.keys(segsByRow||{}).length;
  document.getElementById('foot').innerHTML=segs.length+' Seg · '+sigs.length+' 信号 · '+rc+' 行轨道';
}

/* 初始化 */
api(STATE_ENDPOINT,function(){fit();if(!ENGINE_MODE)playBtn();});
// topology renderer loaded below
</script>
<script src="member-c-topology.js"></script>
</body>
</html>
